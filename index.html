<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img src="coffee" alt="Coffee Image">
        <span class="tag">Best Seller</span>
        <h2>Cappuccino</h2>
        <p>Rich creamy coffee with smooth foam.</p>
        <div class="rating">
            ★★★★☆  
        </div>
        <h3>$6.99</h3>
        <button>Order Now</button>
    </div>
</body>
</html>
